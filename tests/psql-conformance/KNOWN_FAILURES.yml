# Known failures — the conformance ledger.
#
# Each TS psql work-package that ships should REMOVE entries from this
# file as features land. The harness fails the suite if an entry is
# stale (i.e. the test now passes), which mechanically forces the
# ledger to stay accurate.
#
# Entry schema:
#   - test:     'regress/<name>' or 'tap/<name>' (matches `testName` in
#               the assertion call)
#     scope:    'full-file' (matches the whole test) or 'subtest'
#               (matches a single named sub-assertion)
#     subtest:  required when scope is 'subtest'; the exact subtest name
#     reason:   short human description; reference the WP
#     owner:    GitHub handle / team
#     ticket:   optional issue id
#     added:    ISO date the entry was added
#     pg:       OPTIONAL PG major ('14'..'18'). When set, the entry
#               only applies on runs where the server matches (i.e.
#               $PGCONFORMANCE_PG_MAJOR is the same string). Unset =
#               applies to every PG major. Use this for upstream test
#               output that legitimately differs across versions, e.g.
#               PG 18 added columns to \df+.
#
# Day-1: the system psql passes every vendored regress test, so this
# file is empty. Once the harness is pointed at the TS implementation
# (PSQL_BINARY=./bin/ts-psql), populate from a failing run.

# ---------------------------------------------------------------------------
# tap/001_basic — port of upstream src/bin/psql/t/001_basic.pl.
#
# Entries below were seeded from the first integration run of the port
# against the embedded TS psql. Each is a real divergence from upstream
# psql's behaviour that has been acknowledged but not yet fixed. As the
# corresponding TS implementation gap is filled, the entry MUST be
# removed (the harness fails the suite on a passing test that still has
# a ledger entry — that is the 4-quadrant truth table at work).
# ---------------------------------------------------------------------------

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > runs N=3 iterations at 10ms interval (lines 371-373)'
  reason: '\watch does not parse `c=N` (iteration count) or `i=F` (interval-in-seconds) named flags — upstream syntax. The TS parser raises `syntax error at or near "\\"`.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > runs N=3 iterations at 0.0001s interval (sub-ms, lines 376-378)'
  reason: 'Same \watch named-flag parser gap as above.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > runs N=3 iterations with WATCH_INTERVAL=0 (lines 381-384)'
  reason: 'Same \watch named-flag parser gap (the `c=` arg).'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > rejects m=x (invalid minimum row count, lines 387-391)'
  reason: '\watch does not reject `m=<non-numeric>`; the option silently no-ops.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > rejects negative interval value (lines 411-414)'
  reason: '\watch accepts negative positional interval (`-10`); upstream rejects with "incorrect interval value".'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > rejects garbage interval value (lines 416-419)'
  reason: '\watch accepts garbage positional interval (`10ab`); upstream rejects with "incorrect interval value".'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > rejects out-of-range interval value (lines 421-424)'
  reason: '\watch accepts out-of-range positional interval (`10e400`); upstream rejects.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\watch > WATCH_INTERVAL is set, updated on \set, restored on \unset (lines 438-448)'
  reason: '`WATCH_INTERVAL` psql variable is not initialised to 2 by default and `\echo :WATCH_INTERVAL` does not substitute. Once :NAME substitution lands, the literal `:WATCH_INTERVAL` token will go away.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\g piped into an external program > single SELECT \g | cat > file (lines 462-464)'
  reason: '\g | <program> is not implemented — psql currently emits to stdout instead of piping the rendered output through a child process. Output file is never written.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\g piped into an external program > multi-statement SELECT ... \g | cat > file emits both rows (lines 466-469)'
  reason: 'Same \g pipe gap as above.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: '\g piped into an external program > COPY (values ...) TO STDOUT \g | cat > file (lines 481-484)'
  reason: 'Same \g pipe gap as above (COPY variant).'
  owner: '@team-cli'
  added: 2026-05-25

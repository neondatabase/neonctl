# Known failures — the conformance ledger.
#
# Each TS psql work-package that ships should REMOVE entries from this
# file as features land. The harness fails the suite if an entry is
# stale (i.e. the test now passes), which mechanically forces the
# ledger to stay accurate.
#
# Entry schema:
#   - test:     'regress/<name>' or 'tap/<name>' (matches `testName` in
#               the assertion call)
#     scope:    'full-file' (matches the whole test) or 'subtest'
#               (matches a single named sub-assertion)
#     subtest:  required when scope is 'subtest'; the exact subtest name
#     reason:   short human description; reference the WP
#     owner:    GitHub handle / team
#     ticket:   optional issue id
#     added:    ISO date the entry was added
#     pg:       OPTIONAL PG major ('14'..'18'). When set, the entry
#               only applies on runs where the server matches (i.e.
#               $PGCONFORMANCE_PG_MAJOR is the same string). Unset =
#               applies to every PG major. Use this for upstream test
#               output that legitimately differs across versions, e.g.
#               PG 18 added columns to \df+.
#
# Day-1: the system psql passes every vendored regress test, so this
# file is empty. Once the harness is pointed at the TS implementation
# (PSQL_BINARY=./bin/ts-psql), populate from a failing run.

# ---------------------------------------------------------------------------
# tap/001_basic — port of upstream src/bin/psql/t/001_basic.pl.
#
# Entries below were seeded from the first integration run of the port
# against the embedded TS psql. Each is a real divergence from upstream
# psql's behaviour that has been acknowledged but not yet fixed. As the
# corresponding TS implementation gap is filled, the entry MUST be
# removed (the harness fails the suite on a passing test that still has
# a ledger entry — that is the 4-quadrant truth table at work).
# ---------------------------------------------------------------------------

- test: tap/001_basic
  scope: subtest
  subtest: '\timing > emits "Time:" even when the query errors (lines 96-108)'
  reason: 'TS psql exits 0 on `-c`/stdin script with SQL syntax error; upstream exits non-zero. Root cause: error path in executeInputString does not propagate to exit status.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: 'ENCODING is set and updates on `set client_encoding` (lines 112-119)'
  reason: 'TS psql does not initialise the `ENCODING` psql variable from the server `client_encoding` parameter, nor does it refresh it on `SET client_encoding = ...`. `\echo :ENCODING` prints the literal `:ENCODING` token.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: 'LISTEN / NOTIFY > plain NOTIFY surfaces an "Asynchronous notification" line (lines 122-127)'
  reason: 'TS psql does not surface asynchronous NotificationResponse messages from the server. Upstream prints `Asynchronous notification "foo" received from server process with PID N.` on each delivery.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: 'LISTEN / NOTIFY > NOTIFY ... with payload includes the payload (lines 129-134)'
  reason: 'Same NotificationResponse gap as above; payload variant.'
  owner: '@team-cli'
  added: 2026-05-25

- test: tap/001_basic
  scope: subtest
  subtest: 'terminates the backend mid-script -> exit code 2 and connection-lost stderr (lines 137-151)'
  reason: 'TS psql exits 0 after the backend terminates the connection mid-script. Upstream exits 2 and emits a `connection to server was lost` diagnostic.'
  owner: '@team-cli'
  added: 2026-05-25


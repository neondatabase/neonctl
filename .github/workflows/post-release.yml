name: Post-release (tag + handoff)

# Fires when a prepare-release PR merges. Steps:
#   1. Parse the squash commit subject for `neonctl@v<ver>`
#   2. Create the `v<ver>` tag on the merge commit
#   3. Push the tag
#   4. Comment on the merged PR with Stage 2 (npm publish) dispatch instructions
#   5. Write the same instructions to the workflow run summary
#
# No cross-repo dispatch. Stage 2 is triggered by a human from the PR comment
# or summary. See prepare-release.yml header for why.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: post-release
  cancel-in-progress: false

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  tag-and-handoff:
    if: "startsWith(github.event.head_commit.message, 'chore: release neonctl@')"
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # push tags
      pull-requests: write # comment on PR

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Diagnostic — log event identity
        # Records actor/sender/ref/sha for post-release forensic auditing.
        env:
          ACTOR: ${{ github.actor }}
          SENDER: ${{ github.event.sender.login }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          echo "actor:  $ACTOR"
          echo "sender: $SENDER"
          echo "ref:    $REF"
          echo "sha:    $SHA"
          {
            echo "### Event identity"
            echo "- **actor:** \`$ACTOR\`"
            echo "- **sender:** \`$SENDER\`"
            echo "- **ref:** \`$REF\`"
            echo "- **sha:** \`$SHA\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Parse release metadata
        id: parse
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          # Source of truth: the package.json on the merge commit (written by
          # Stage 1's `Bump version` step and validated there against strict
          # semver). The commit subject is checked for agreement but is not
          # itself the source — that avoids silent drift if a future regex
          # change here disagrees with the producer's validation.
          VERSION=$(jq -r '.version' package.json)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "::error::Could not read .version from package.json on ${GITHUB_SHA}."
            exit 1
          fi

          # Parse SUBJECT LINE ONLY — squash bodies may concatenate other
          # commit subjects that contain version-like tokens.
          SUBJECT=$(echo "$MSG" | head -n 1)

          # Cross-check: the commit subject must reference the same version.
          # Use a literal substring match so we don't have to keep a semver
          # regex in sync with the producer.
          if ! grep -qF "neonctl@v$VERSION" <<<"$SUBJECT"; then
            echo "::error::Commit subject does not reference package.json version v$VERSION. Subject: $SUBJECT"
            exit 1
          fi

          # PR number is the last `(#NNN)` in the subject (squash merges add this).
          # `|| true` so we still tag + summarize even if PR comment is impossible.
          PR_NUM=$(echo "$SUBJECT" | grep -oE '\(#[0-9]+\)' | tail -1 | grep -oE '[0-9]+' || true)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUM:-}" >> "$GITHUB_OUTPUT"

      - name: Create + push tag on merge commit
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            existing=$(git rev-parse "refs/tags/$TAG^{commit}" 2>/dev/null || git rev-parse "refs/tags/$TAG")
            if [[ "$existing" == "$SHA" ]]; then
              echo "Tag $TAG already exists and points at $SHA — nothing to do."
            else
              echo "::error::Tag $TAG already exists but points at $existing (expected $SHA). Delete the stale tag and re-run."
              exit 1
            fi
          else
            git tag -a "$TAG" -m "Release $TAG" "$SHA"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG → $SHA"
          fi

      - name: Build Stage 2 handoff message
        id: handoff
        env:
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          # TODO(once Stage 2 is live): confirm exact workflow filename + input names
          # in databricks/secure-public-registry-releases-eng — assumed `neonctl.yml`
          # with inputs `ref` and `dry-run`.
          {
            echo "body<<HANDOFF_EOF"
            echo ":rocket: **Tagged \`${TAG}\` on the merge commit.**"
            echo ""
            echo "### Stage 2 — publish to npm"
            echo ""
            echo "> :warning: **Provisional:** the workflow filename and input names below are assumed to match the central repo's setup. If Stage 2 uses different names, the dispatch commands need updating in \`.github/workflows/post-release.yml\`."
            echo ""
            echo "Trigger the publish workflow in \`databricks/secure-public-registry-releases-eng\`:"
            echo ""
            echo "\`\`\`bash"
            echo "# Dry run (recommended first):"
            echo "gh workflow run neonctl.yml \\"
            echo "  --repo databricks/secure-public-registry-releases-eng \\"
            echo "  --ref main \\"
            echo "  -f ref=${TAG} \\"
            echo "  -f dry-run=true"
            echo ""
            echo "# Real publish:"
            echo "gh workflow run neonctl.yml \\"
            echo "  --repo databricks/secure-public-registry-releases-eng \\"
            echo "  --ref main \\"
            echo "  -f ref=${TAG} \\"
            echo "  -f dry-run=false"
            echo "\`\`\`"
            echo ""
            echo "After publish, verify on [npm](https://www.npmjs.com/package/neonctl) and the [GitHub release](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG})."
            echo "HANDOFF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write summary
        env:
          BODY: ${{ steps.handoff.outputs.body }}
        run: |
          echo "$BODY" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on merged PR
        if: steps.parse.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.parse.outputs.pr_number }}
          BODY: ${{ steps.handoff.outputs.body }}
        run: |
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body "$BODY"

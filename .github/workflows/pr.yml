name: PR to main branch
on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  build:
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup node
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: .tool-versions
      - name: Setup JFrog CLI with OIDC
        id: setup-jfrog
        uses: jfrog/setup-jfrog-cli@279b1f629f43dd5bc658d8361ac4802a7ef8d2d5 # v4.9.1
        env:
          JF_URL: https://databricks.jfrog.io
        with:
          oidc-provider-name: github-actions
      - name: Configure npm registry
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://databricks.jfrog.io/artifactory/api/npm/db-npm/
          //databricks.jfrog.io/artifactory/api/npm/db-npm/:_authToken=${{ steps.setup-jfrog.outputs.oidc-token }}
          always-auth=true
          EOF
      - name: Install pnpm
        run: npm install -g pnpm@9.15.9
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm run test
